<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF8F1"/>
      <stop offset="0.55" stop-color="#F6EEDD"/>
      <stop offset="1" stop-color="#F6E4DF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CEAC64"/>
      <stop offset="1" stop-color="#9C7838"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- soft blush glow -->
  <circle cx="640" cy="90" r="150" fill="#EBC8BF" opacity="0.25"/>
  <circle cx="140" cy="380" r="170" fill="#CDD6BC" opacity="0.25"/>

  <!-- interlocked rings -->
  <g fill="none" stroke-linecap="round">
    <circle cx="368" cy="210" r="74" stroke="url(#gold)" stroke-width="10"/>
    <circle cx="440" cy="210" r="74" stroke="#DBA396" stroke-width="9" opacity="0.9"/>
    <path d="M 410 152 A 74 74 0 0 1 438 202" stroke="url(#gold)" stroke-width="10"/>
  </g>

  <!-- laurel arcs -->
  <g fill="none" stroke="#8CA06E" stroke-width="4" stroke-linecap="round">
    <path d="M 180 330 Q 400 390 620 330"/>
  </g>
  <g fill="#8CA06E">
    <ellipse cx="230" cy="338" rx="16" ry="6.5" transform="rotate(16 230 338)"/>
    <ellipse cx="300" cy="349" rx="16" ry="6.5" transform="rotate(9 300 349)"/>
    <ellipse cx="368" cy="355" rx="16" ry="6.5" transform="rotate(3 368 355)"/>
    <ellipse cx="432" cy="355" rx="16" ry="6.5" transform="rotate(-3 432 355)"/>
    <ellipse cx="500" cy="349" rx="16" ry="6.5" transform="rotate(-9 500 349)"/>
    <ellipse cx="570" cy="338" rx="16" ry="6.5" transform="rotate(-16 570 338)"/>
  </g>

  <!-- florals -->
  <g>
    <circle cx="400" cy="356" r="12" fill="#DBA396"/>
    <circle cx="416" cy="360" r="8" fill="#EBC8BF"/>
    <circle cx="386" cy="362" r="7" fill="#F6E4DF"/>
  </g>

  <!-- petals -->
  <g opacity="0.85">
    <ellipse cx="170" cy="110" rx="12" ry="6" fill="#EBC8BF" transform="rotate(24 170 110)"/>
    <ellipse cx="655" cy="250" rx="11" ry="5.5" fill="#DEC690" transform="rotate(-28 655 250)"/>
    <ellipse cx="580" cy="120" rx="9" ry="4.5" fill="#CDD6BC" transform="rotate(50 580 120)"/>
    <ellipse cx="215" cy="245" rx="9" ry="4.5" fill="#F6E4DF" transform="rotate(-40 215 245)"/>
  </g>
</svg>
