<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Eweeha - Wedding Cars Lebanon">
  <defs>
    <linearGradient id="wine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8E3B46"/>
      <stop offset="0.55" stop-color="#742F38"/>
      <stop offset="1" stop-color="#5C262D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DEC690"/>
      <stop offset="0.5" stop-color="#BA9348"/>
      <stop offset="1" stop-color="#9C7838"/>
    </linearGradient>
  </defs>

  <!-- Wine medallion -->
  <circle cx="256" cy="256" r="248" fill="url(#wine)"/>
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <circle cx="256" cy="256" r="222" fill="none" stroke="#FFFEF9" stroke-width="1.5" opacity="0.35"/>

  <!-- Ribbon bow (top)  the just-married car ribbon -->
  <g stroke="#FFFEF9" fill="none" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <!-- left loop -->
    <path d="M 256 148 C 216 108 164 118 168 154 C 171 182 220 186 256 148 Z" fill="#FFFEF9" fill-opacity="0.12"/>
    <!-- right loop -->
    <path d="M 256 148 C 296 108 348 118 344 154 C 341 182 292 186 256 148 Z" fill="#FFFEF9" fill-opacity="0.12"/>
    <!-- knot -->
    <circle cx="256" cy="148" r="13" fill="#FFFEF9" stroke="none"/>
  </g>

  <!-- Ribbon tails dropping to the rings -->
  <g stroke="#FFFEF9" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M 245 160 C 222 208 216 234 210 258"/>
    <path d="M 267 160 C 290 208 296 234 302 258"/>
  </g>

  <!-- Interlocked gold rings hanging from the ribbons -->
  <g fill="none" stroke-linecap="round">
    <circle cx="216" cy="312" r="58" stroke="url(#gold)" stroke-width="15"/>
    <circle cx="296" cy="312" r="58" stroke="#EBC3C9" stroke-width="13"/>
    <!-- re-draw arc of the gold ring so the rings interlock -->
    <path d="M 252 266 A 58 58 0 0 1 273 300" stroke="url(#gold)" stroke-width="15"/>
    <!-- diamond spark on the gold ring -->
    <g fill="#FFFEF9" stroke="url(#gold)" stroke-width="5">
      <path d="M 216 240 L 231 258 L 216 276 L 201 258 Z"/>
    </g>
  </g>

  <!-- Celebration confetti -->
  <g fill="#DEC690">
    <circle cx="122" cy="210" r="7"/>
    <circle cx="396" cy="228" r="6"/>
    <circle cx="150" cy="368" r="6"/>
  </g>
  <g fill="#EBC3C9">
    <circle cx="132" cy="286" r="5"/>
    <circle cx="382" cy="330" r="7"/>
    <circle cx="356" cy="150" r="5"/>
  </g>
</svg>
